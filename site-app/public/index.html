<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pomodoro Timer Manager</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="
    margin: 0;
    padding: 0;
    font-family: Arial, Helvetica, sans-serif;
    background-color: #f4f6f8;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    text-align: center;
">

    <div style="
        background-color: #ffffff;
        padding: 40px;
        border-radius: 12px;
        box-shadow: 0 8px 20px rgba(0,0,0,0.08);
        max-width: 500px;
        width: 90%;
    ">

        <h1 style="
            margin-top: 0;
            color: #2c3e50;
            font-size: 28px;
        ">
            Pomodoro Timer Manager
        </h1>

        <p style="
            color: #555;
            font-size: 16px;
            line-height: 1.6;
        ">
            Welcome to Pomodoro Timer Manager.
        </p>

        <p style="
            color: #555;
            font-size: 16px;
            line-height: 1.6;
        ">
            This app was designed to help you stay focused,
            manage your time efficiently, and improve productivity
            using the Pomodoro technique.
        </p>

        <p style="
            color: #777;
            font-size: 14px;
            margin-top: 30px;
        ">
            Thank you for using our app.
        </p>

    </div>

</body>
</html>
